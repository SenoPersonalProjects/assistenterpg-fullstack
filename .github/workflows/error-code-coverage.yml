name: Error Code Coverage

on:
  pull_request:
    paths:
      - "assistenterpg-back/src/**"
      - "assistenterpg-front/src/lib/api/error-handler.ts"
      - "assistenterpg-front/scripts/check-error-code-coverage.mjs"
      - ".github/workflows/error-code-coverage.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "assistenterpg-back/src/**"
      - "assistenterpg-front/src/lib/api/error-handler.ts"
      - "assistenterpg-front/scripts/check-error-code-coverage.mjs"
      - ".github/workflows/error-code-coverage.yml"
  workflow_dispatch:

jobs:
  check-error-code-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistenterpg-front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: assistenterpg-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check backend/frontend error-code coverage
        run: npm run check:error-codes
